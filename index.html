<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kharcha — Voice Expense Logger</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --border: #2e2c29;
    --accent: #f0c040;
    --accent2: #e8855a;
    --text: #f0ede8;
    --text2: #9a9690;
    --text3: #5a5752;
    --success: #6fcf97;
    --error: #eb5757;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(240,192,64,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(232,133,90,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 36px;
    padding-top: 8px;
  }

  header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 2.8rem;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }

  header h1 span {
    color: var(--accent);
    font-style: italic;
  }

  header p {
    margin-top: 8px;
    font-size: 0.82rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* AUTH SECTION */
  #auth-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }

  #auth-section h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 14px;
  }

  .auth-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .auth-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.88rem;
    color: var(--text2);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }

  .dot.connected { background: var(--success); box-shadow: 0 0 6px rgba(111,207,151,0.5); }
  .dot.error { background: var(--error); }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .btn:hover {
    background: var(--border);
    border-color: var(--text3);
  }

  .btn.accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .btn.accent:hover {
    background: #f5d060;
  }

  /* CONFIG */
  #config-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }

  #config-section h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 14px;
  }

  .config-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  label {
    font-size: 0.78rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 4px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus {
    border-color: var(--accent);
  }

  .save-config-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 6px;
  }

  /* RECORD BUTTON */
  #record-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 8px 0 24px;
  }

  #record-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
    position: relative;
    outline: none;
  }

  #record-btn:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  #record-btn.recording {
    border-color: var(--error);
    background: rgba(235, 87, 87, 0.08);
    animation: pulse-ring 1.5s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(235,87,87,0.3); }
    70% { box-shadow: 0 0 0 20px rgba(235,87,87,0); }
    100% { box-shadow: 0 0 0 0 rgba(235,87,87,0); }
  }

  .mic-icon {
    font-size: 2rem;
    transition: transform 0.2s;
  }

  #record-btn.recording .mic-icon {
    transform: scale(1.1);
  }

  .record-label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    transition: color 0.2s;
  }

  #record-btn.recording .record-label {
    color: var(--error);
  }

  #record-hint {
    margin-top: 14px;
    font-size: 0.8rem;
    color: var(--text3);
    text-align: center;
    font-style: italic;
    font-family: 'Instrument Serif', serif;
    min-height: 20px;
    transition: color 0.2s;
  }

  /* TRANSCRIPT PREVIEW */
  #transcript-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 16px;
    min-height: 72px;
    display: none;
    position: relative;
  }

  #transcript-box.visible { display: block; }

  #transcript-box .label {
    font-size: 0.7rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  #transcript-text {
    font-family: 'Instrument Serif', serif;
    font-size: 1.1rem;
    color: var(--text2);
    font-style: italic;
    line-height: 1.5;
  }

  /* PARSED PREVIEW */
  #parsed-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    display: none;
  }

  #parsed-box.visible { display: block; }

  #parsed-box .label {
    font-size: 0.7rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .parsed-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .parsed-field {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .parsed-field .field-label {
    font-size: 0.68rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .parsed-field .field-value {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
  }

  .parsed-field .field-value.amount {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-size: 1.1rem;
  }

  .parsed-field input.field-value {
    background: none;
    border: none;
    padding: 0;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    width: 100%;
    outline: none;
  }

  .parsed-field input.field-value:focus {
    color: var(--accent);
  }

  .action-row {
    display: flex;
    gap: 10px;
  }

  .action-row .btn {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-size: 0.9rem;
  }

  /* STATUS */
  #status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    display: none;
    align-items: center;
    gap: 10px;
  }

  #status-bar.visible { display: flex; }
  #status-bar.success { border-color: rgba(111,207,151,0.3); color: var(--success); }
  #status-bar.error { border-color: rgba(235,87,87,0.3); color: var(--error); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* RECENT LOG */
  #recent-section {
    margin-top: 8px;
  }

  #recent-section h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 12px;
  }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-item .log-left {
    flex: 1;
  }

  .log-item .log-name {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .log-item .log-meta {
    font-size: 0.75rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .log-item .log-amount {
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    font-weight: 500;
    color: var(--accent);
  }

  /* TOGGLE CONFIG */
  .section-toggle {
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    padding: 8px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }

  .section-toggle:hover { color: var(--text2); }

  .collapsible { display: none; }
  .collapsible.open { display: block; }

  /* EXAMPLE PHRASES */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .example-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.78rem;
    color: var(--text3);
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    cursor: pointer;
    transition: all 0.15s;
  }

  .example-chip:hover {
    border-color: var(--accent);
    color: var(--text2);
  }

</style>
</head>
<body>
<div class="app">

  <header>
    <h1>Khar<span>cha</span></h1>
    <p>Voice → Sheet → Done</p>
  </header>

  <!-- AUTH -->
  <div id="auth-section">
    <h3>Google Sheets</h3>
    <div class="auth-row">
      <div class="auth-status">
        <div class="dot" id="auth-dot"></div>
        <span id="auth-label">Not connected</span>
      </div>
      <button class="btn accent" id="auth-btn" onclick="handleAuth()">Connect Google</button>
    </div>
  </div>

  <!-- CONFIG (collapsible) -->
  <button class="section-toggle" onclick="toggleConfig()">
    <span id="config-arrow">▶</span> Settings
  </button>
  <div class="collapsible" id="config-section">
    <div class="config-grid">
      <div>
        <label>Claude API Key</label>
        <input type="password" id="claude-key" placeholder="sk-ant-api03-..." />
      </div>
      <div>
        <label>Spreadsheet ID</label>
        <input type="text" id="sheet-id" placeholder="1TnNmG41Dh..." />
      </div>
      <div>
        <label>Tab / Sheet Name</label>
        <input type="text" id="tab-name" placeholder="2026 Cost Sheet" />
      </div>
    </div>
    <div class="save-config-row">
      <button class="btn accent" onclick="saveConfig()">Save Settings</button>
    </div>
  </div>

  <!-- RECORD -->
  <div id="record-section">
    <button id="record-btn" onclick="toggleRecord()">
      <span class="mic-icon">🎙️</span>
      <span class="record-label" id="record-label">Tap to speak</span>
    </button>
    <p id="record-hint">Say the item, amount, and payment mode</p>
    <div class="examples">
      <span class="example-chip" onclick="fillExample(this)">"Patti Samosa Pav, 30 rupees, cash"</span>
      <span class="example-chip" onclick="fillExample(this)">"Uber 126 rupees Kotak CC"</span>
      <span class="example-chip" onclick="fillExample(this)">"Electricity bill 1500 UPI"</span>
    </div>
  </div>

  <!-- STATUS -->
  <div id="status-bar">
    <div class="spinner" id="status-spinner"></div>
    <span id="status-text"></span>
  </div>

  <!-- TRANSCRIPT -->
  <div id="transcript-box">
    <div class="label">You said</div>
    <div id="transcript-text"></div>
  </div>

  <!-- PARSED PREVIEW -->
  <div id="parsed-box">
    <div class="label">Parsed — confirm before saving</div>
    <div class="parsed-grid">
      <div class="parsed-field" style="grid-column: 1/-1">
        <div class="field-label">Item</div>
        <input class="field-value" id="p-item" type="text" />
      </div>
      <div class="parsed-field">
        <div class="field-label">Amount (₹)</div>
        <input class="field-value amount" id="p-amount" type="text" style="color: var(--accent); font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight:500;" />
      </div>
      <div class="parsed-field">
        <div class="field-label">Mode</div>
        <input class="field-value" id="p-mode" type="text" />
      </div>
      <div class="parsed-field" style="grid-column: 1/-1">
        <div class="field-label">Category</div>
        <input class="field-value" id="p-category" type="text" />
      </div>
    </div>
    <div class="action-row">
      <button class="btn" onclick="discardEntry()">✕ Discard</button>
      <button class="btn accent" onclick="confirmSave()">✓ Save to Sheet</button>
    </div>
  </div>

  <!-- RECENT LOG -->
  <div id="recent-section">
    <h3>Today's entries</h3>
    <div id="log-list"></div>
  </div>

</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const GOOGLE_CLIENT_ID = '978737080550-bg957d1difb7pqi4skun2o2d08f797ch.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

let config = {
  claudeKey: localStorage.getItem('claudeKey') || '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',
  sheetId: localStorage.getItem('sheetId') || '1TnNmG41DhIsXVIYnYZlFNN4afU_27crkF0UV54UZFf8',
  tabName: localStorage.getItem('tabName') || '2026 Cost Sheet',
};

let tokenClient, accessToken = null;
let mediaRecorder, audioChunks = [];
let isRecording = false;
let todayLog = [];

const CATEGORIES = [
  'Restaurants/Snacks/Outside Food',
  'Groceries',
  'Public Transport',
  'Fuel',
  'Home Maintenance',
  'Utilities/Bill Payments',
  'Prints/Stationery/Photos',
  'Medical/Health',
  'Entertainment/OTT/Apps',
  'Shopping/Clothing',
  'Personal Care',
  'Education',
  'Gifts/Donations',
  'Travel/Hotels',
  'Miscellaneous'
];

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.onload = () => {
  // Pre-fill config inputs
  document.getElementById('claude-key').value = config.claudeKey;
  document.getElementById('sheet-id').value = config.sheetId;
  document.getElementById('tab-name').value = config.tabName;

  // Load Google Identity Services
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = initGoogleAuth;
  document.head.appendChild(script);

  // Restore token from session
  const saved = sessionStorage.getItem('gToken');
  if (saved) {
    accessToken = saved;
    setAuthConnected();
  }
};

function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { setAuthError(resp.error); return; }
      accessToken = resp.access_token;
      sessionStorage.setItem('gToken', accessToken);
      setAuthConnected();
    }
  });
}

function handleAuth() {
  if (!tokenClient) {
    showStatus('Google auth not ready yet, please wait...', 'error');
    return;
  }
  if (accessToken) {
    // Already connected — disconnect
    accessToken = null;
    sessionStorage.removeItem('gToken');
    document.getElementById('auth-dot').className = 'dot';
    document.getElementById('auth-label').textContent = 'Not connected';
    document.getElementById('auth-btn').textContent = 'Connect Google';
    return;
  }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function setAuthConnected() {
  document.getElementById('auth-dot').className = 'dot connected';
  document.getElementById('auth-label').textContent = 'Connected';
  document.getElementById('auth-btn').textContent = 'Disconnect';
  document.getElementById('auth-btn').classList.remove('accent');
}

function setAuthError(msg) {
  document.getElementById('auth-dot').className = 'dot error';
  document.getElementById('auth-label').textContent = 'Error: ' + msg;
}

// ─── CONFIG TOGGLE ────────────────────────────────────────────────────────────
function toggleConfig() {
  const el = document.getElementById('config-section');
  const arrow = document.getElementById('config-arrow');
  el.classList.toggle('open');
  arrow.textContent = el.classList.contains('open') ? '▼' : '▶';
}

function saveConfig() {
  config.claudeKey = document.getElementById('claude-key').value.trim();
  config.sheetId = document.getElementById('sheet-id').value.trim();
  config.tabName = document.getElementById('tab-name').value.trim();
  localStorage.setItem('claudeKey', config.claudeKey);
  localStorage.setItem('sheetId', config.sheetId);
  localStorage.setItem('tabName', config.tabName);
  toggleConfig();
  showStatus('Settings saved ✓', 'success');
  setTimeout(hideStatus, 2000);
}

// ─── RECORDING ────────────────────────────────────────────────────────────────
async function toggleRecord() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = processAudio;
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('record-btn').classList.add('recording');
    document.getElementById('record-label').textContent = 'Tap to stop';
    document.getElementById('record-hint').textContent = 'Listening...';
  } catch (e) {
    showStatus('Microphone access denied. Please allow mic access.', 'error');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  isRecording = false;
  document.getElementById('record-btn').classList.remove('recording');
  document.getElementById('record-label').textContent = 'Tap to speak';
  document.getElementById('record-hint').textContent = 'Processing...';
}

async function processAudio() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  showStatus('Transcribing audio...', 'loading');

  // Convert to base64
  const base64 = await blobToBase64(blob);

  // Use Web Speech API if available (free), else use Claude with audio
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    // Web Speech API path — re-record using recognition
    showStatus('Use the mic button and speak clearly.', 'loading');
  }

  // We'll use Claude's audio understanding via base64
  await transcribeWithClaude(base64, blob.type);
}

async function transcribeWithClaude(audioBase64, mimeType) {
  showStatus('Analysing with Claude...', 'loading');

  const today = new Date();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayName = dayNames[today.getDay()];
  const dateStr = `${String(today.getDate()).padStart(2,'0')}-${monthNames[today.getMonth()].substring(0,3)}-${today.getFullYear()}`;
  const monthName = monthNames[today.getMonth()];

  const prompt = `You are an expense parser for an Indian personal finance tracker. The user spoke an expense entry. Extract the details and return ONLY a valid JSON object, nothing else.

Today is ${dayName}, ${dateStr}, Month: ${monthName}.

Categories available:
${CATEGORIES.map((c,i) => `${i+1}. ${c}`).join('\n')}

Payment modes commonly used: Cash, Kotak CC, Kotak UPI, UPI, Card, Paytm

Return this exact JSON structure:
{
  "item": "item name (capitalize nicely)",
  "amount": 123.45,
  "mode": "Cash",
  "category": "exact category from list above",
  "month": "${monthName}",
  "day": "${dayName}",
  "date": "${dateStr}"
}

If you cannot determine a field, make your best guess. For mode, default to "Cash" if unclear. Detect category automatically from item name.

The user said (transcribe from audio and parse):`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': config.claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: [
            { type: 'text', text: prompt },
            {
              type: 'document',
              source: {
                type: 'base64',
                media_type: mimeType || 'audio/webm',
                data: audioBase64.split(',')[1] || audioBase64
              }
            }
          ]
        }]
      })
    });

    if (!res.ok) {
      // Audio documents not supported — fall back to text transcript
      await fallbackToSpeechAPI();
      return;
    }

    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '';
    parseAndShow(text, '(voice input)');

  } catch (e) {
    await fallbackToSpeechAPI();
  }
}

// ─── FALLBACK: WEB SPEECH API ─────────────────────────────────────────────────
function fallbackToSpeechAPI() {
  return new Promise((resolve) => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      showStatus('Speech recognition not supported. Try Chrome.', 'error');
      resolve();
      return;
    }

    showStatus('', 'loading');
    document.getElementById('status-text').textContent = 'Please speak your expense now...';

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-IN';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = async (event) => {
      const transcript = event.results[0][0].transcript;
      document.getElementById('transcript-text').textContent = '"' + transcript + '"';
      document.getElementById('transcript-box').classList.add('visible');
      showStatus('Parsing with Claude...', 'loading');
      await parseTextWithClaude(transcript);
      resolve();
    };

    recognition.onerror = (e) => {
      showStatus('Could not hear audio. Please try again.', 'error');
      document.getElementById('record-hint').textContent = 'Say the item, amount, and payment mode';
      resolve();
    };

    recognition.start();
  });
}

// ─── PARSE TEXT ────────────────────────────────────────────────────────────────
async function parseTextWithClaude(transcript) {
  const today = new Date();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayName = dayNames[today.getDay()];
  const dateStr = `${String(today.getDate()).padStart(2,'0')}-${monthNames[today.getMonth()].substring(0,3)}-${today.getFullYear()}`;
  const monthName = monthNames[today.getMonth()];

  const prompt = `You are an expense parser for an Indian personal finance tracker. Parse this spoken expense entry and return ONLY valid JSON.

Spoken input: "${transcript}"

Today: ${dayName}, ${dateStr}, Month: ${monthName}

Categories:
${CATEGORIES.map((c,i) => `${i+1}. ${c}`).join('\n')}

Payment modes: Cash, Kotak CC, Kotak UPI, UPI, Card, Paytm, HDFC CC, SBI CC

Return ONLY this JSON, no markdown, no explanation:
{
  "item": "item name",
  "amount": 123.45,
  "mode": "Cash",
  "category": "category from list",
  "month": "${monthName}",
  "day": "${dayName}",
  "date": "${dateStr}"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': config.claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '';
    parseAndShow(text, transcript);

  } catch (e) {
    showStatus('Claude API error: ' + e.message, 'error');
  }
}

// ─── PARSE JSON RESPONSE ───────────────────────────────────────────────────────
function parseAndShow(jsonText, transcript) {
  try {
    const clean = jsonText.replace(/```json|```/g, '').trim();
    const match = clean.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON found');
    const parsed = JSON.parse(match[0]);

    // Show transcript
    if (transcript && transcript !== '(voice input)') {
      document.getElementById('transcript-text').textContent = '"' + transcript + '"';
      document.getElementById('transcript-box').classList.add('visible');
    }

    // Fill editable fields
    document.getElementById('p-item').value = parsed.item || '';
    document.getElementById('p-amount').value = parsed.amount || '';
    document.getElementById('p-mode').value = parsed.mode || 'Cash';
    document.getElementById('p-category').value = parsed.category || '';

    // Store full data
    document.getElementById('parsed-box').dataset.full = JSON.stringify(parsed);
    document.getElementById('parsed-box').classList.add('visible');

    hideStatus();
    document.getElementById('record-hint').textContent = 'Check details, then save to sheet';

  } catch (e) {
    showStatus('Could not parse response. Try again.', 'error');
  }
}

// ─── SAVE TO SHEET ─────────────────────────────────────────────────────────────
async function confirmSave() {
  if (!accessToken) {
    showStatus('Please connect Google Sheets first', 'error');
    return;
  }

  const item = document.getElementById('p-item').value.trim();
  const amount = parseFloat(document.getElementById('p-amount').value);
  const mode = document.getElementById('p-mode').value.trim();
  const category = document.getElementById('p-category').value.trim();

  let parsed;
  try { parsed = JSON.parse(document.getElementById('parsed-box').dataset.full); }
  catch { parsed = {}; }

  const today = new Date();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const row = [
    parsed.month || monthNames[today.getMonth()],
    parsed.day || dayNames[today.getDay()],
    parsed.date || formatDate(today),
    item,
    amount,
    mode,
    category
  ];

  showStatus('Saving to Google Sheet...', 'loading');

  try {
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${config.sheetId}/values/${encodeURIComponent(config.tabName)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
      {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ values: [row] })
      }
    );

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || res.statusText);
    }

    // Add to today's log
    todayLog.unshift({ item, amount, mode, category });
    renderLog();

    // Reset
    document.getElementById('parsed-box').classList.remove('visible');
    document.getElementById('transcript-box').classList.remove('visible');
    document.getElementById('record-hint').textContent = 'Say the item, amount, and payment mode';

    showStatus(`✓ Saved: ${item} — ₹${amount}`, 'success');
    setTimeout(hideStatus, 3000);

  } catch (e) {
    if (e.message.includes('401') || e.message.includes('Invalid Credentials')) {
      accessToken = null;
      sessionStorage.removeItem('gToken');
      setAuthError('Session expired');
      showStatus('Google session expired. Please reconnect.', 'error');
    } else {
      showStatus('Sheet error: ' + e.message, 'error');
    }
  }
}

function discardEntry() {
  document.getElementById('parsed-box').classList.remove('visible');
  document.getElementById('transcript-box').classList.remove('visible');
  document.getElementById('record-hint').textContent = 'Say the item, amount, and payment mode';
  hideStatus();
}

// ─── HELPERS ───────────────────────────────────────────────────────────────────
function formatDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${String(d.getDate()).padStart(2,'0')}-${months[d.getMonth()]}-${d.getFullYear()}`;
}

function blobToBase64(blob) {
  return new Promise((res) => {
    const reader = new FileReader();
    reader.onloadend = () => res(reader.result);
    reader.readAsDataURL(blob);
  });
}

function showStatus(msg, type) {
  const bar = document.getElementById('status-bar');
  const spinner = document.getElementById('status-spinner');
  const text = document.getElementById('status-text');
  bar.className = 'visible';
  if (type === 'loading') bar.classList.add('');
  if (type === 'success') bar.classList.add('success');
  if (type === 'error') bar.classList.add('error');
  spinner.style.display = type === 'loading' ? 'block' : 'none';
  text.textContent = msg;
}

function hideStatus() {
  document.getElementById('status-bar').className = '';
}

function renderLog() {
  const list = document.getElementById('log-list');
  list.innerHTML = todayLog.slice(0, 8).map(e => `
    <div class="log-item">
      <div class="log-left">
        <div class="log-name">${e.item}</div>
        <div class="log-meta">${e.mode} · ${e.category}</div>
      </div>
      <div class="log-amount">₹${e.amount}</div>
    </div>
  `).join('');
}

function fillExample(el) {
  // Demo mode: fill a fake transcript and parse it
  const text = el.textContent.replace(/"/g, '').trim();
  document.getElementById('transcript-text').textContent = '"' + text + '"';
  document.getElementById('transcript-box').classList.add('visible');
  showStatus('Parsing with Claude...', 'loading');
  parseTextWithClaude(text);
}

// ─── WEB SPEECH DIRECT MODE ───────────────────────────────────────────────────
// Override toggleRecord to use Web Speech directly (more reliable in browsers)
async function toggleRecord() {
  if (isRecording) {
    isRecording = false;
    document.getElementById('record-btn').classList.remove('recording');
    document.getElementById('record-label').textContent = 'Tap to speak';
    document.getElementById('record-hint').textContent = 'Say the item, amount, and payment mode';
    if (window._currentRecognition) {
      window._currentRecognition.stop();
    }
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showStatus('Speech recognition requires Chrome or Edge browser', 'error');
    return;
  }

  isRecording = true;
  document.getElementById('record-btn').classList.add('recording');
  document.getElementById('record-label').textContent = 'Tap to stop';
  document.getElementById('record-hint').textContent = 'Listening... speak clearly';

  const recognition = new SpeechRecognition();
  recognition.lang = 'en-IN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  window._currentRecognition = recognition;

  recognition.onresult = async (event) => {
    isRecording = false;
    document.getElementById('record-btn').classList.remove('recording');
    document.getElementById('record-label').textContent = 'Tap to speak';

    const transcript = event.results[0][0].transcript;
    document.getElementById('transcript-text').textContent = '"' + transcript + '"';
    document.getElementById('transcript-box').classList.add('visible');
    showStatus('Parsing with Claude...', 'loading');
    await parseTextWithClaude(transcript);
  };

  recognition.onerror = (e) => {
    isRecording = false;
    document.getElementById('record-btn').classList.remove('recording');
    document.getElementById('record-label').textContent = 'Tap to speak';
    document.getElementById('record-hint').textContent = 'Could not hear. Try again.';
    hideStatus();
  };

  recognition.onend = () => {
    if (isRecording) {
      isRecording = false;
      document.getElementById('record-btn').classList.remove('recording');
      document.getElementById('record-label').textContent = 'Tap to speak';
    }
  };

  recognition.start();
}
